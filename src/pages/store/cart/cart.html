<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Carrito</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <header class="store-header">
      <h1>🛒 Mi Carrito</h1>
      <a href="../home/home.html">← Seguir comprando</a>
    </header>

    <div class="cart-container">
      <h2>Productos seleccionados</h2>

      <div id="cart-list"></div>

      <div id="empty-msg" style="display: none;">
        <p>Tu carrito está vacío 🛒</p>
        <a href="../home/home.html">Ver catálogo</a>
      </div>

      <div id="cart-footer" style="display: none;">
        <span class="total-label">Total de la compra:</span>
        <span class="total-amount" id="cart-total">$0</span>
        <button id="btn-clear">🗑 Vaciar carrito</button>
      </div>
    </div>

    <script type="module" src="./cart.ts"></script>
  </body>
</html>
